name: Refresh CLI Data Snapshot

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-cli-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh generated CLI data
        run: npm run fetch:cli-data

      - name: Commit and push when snapshot changes
        run: |
          if git diff --quiet -- src/data/generated/cli-data.snapshot.json src/data/generated/cli-data.ts; then
            echo "No snapshot changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add src/data/generated/cli-data.snapshot.json src/data/generated/cli-data.ts
          git commit -m "chore(docs): refresh generated cli data snapshot"
          git push
